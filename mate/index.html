<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#F5EFE3" />
  <title>홀리데이 메이트 — 필름 촬영 동반자</title>
  <meta name="description" content="아날로그 홀리데이의 여행 동반자. 필름카메라로 이 장소를 찍는 법을 알려드려요." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./mate.css" />
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <header class="topbar">
    <div class="wordmark">
      <span class="wordmark-brand">ANALOG HOLIDAY</span>
      <span class="wordmark-app">Holiday Mate</span>
    </div>
    <button id="rollChip" class="roll-chip" title="필름 롤 보기">
      <span class="roll-chip-dot"></span>
      <span id="rollChipText">ROLL —/36</span>
    </button>
  </header>

  <main id="view" class="view"></main>

  <nav class="bottomnav">
    <button data-nav="now"><span class="nav-ico">☀︎</span><span>지금</span></button>
    <button data-nav="roll"><span class="nav-ico">🎞</span><span>필름 롤</span></button>
    <button data-nav="journey"><span class="nav-ico">✳︎</span><span>여정</span></button>
  </nav>

  <!-- 첫 방문 온보딩 시트 -->
  <div id="onboard" class="sheet-backdrop" hidden>
    <div class="sheet">
      <p class="sheet-eyebrow">Welcome, Traveler</p>
      <h2 class="sheet-title">어떤 카메라와<br/>여행 중이신가요?</h2>
      <p class="sheet-sub">빌리신 카메라에 맞춰 촬영 팁을 드려요.</p>
      <div id="cameraPick" class="pick-grid"></div>
      <p class="sheet-label">가이드 목소리</p>
      <div id="personaPick" class="persona-row"></div>
      <button id="onboardDone" class="btn-primary" disabled>여행 시작하기</button>
    </div>
  </div>

  <!-- 한 컷 기록 시트 -->
  <div id="shotSheet" class="sheet-backdrop" hidden>
    <div class="sheet">
      <p class="sheet-eyebrow">One Frame</p>
      <h2 class="sheet-title">한 컷을 기록해요</h2>
      <p class="sheet-sub" id="shotSpotLabel"></p>
      <textarea id="shotNote" class="shot-note" rows="2" maxlength="80"
        placeholder="이 순간의 메모 (선택) — 예: 노을이 골목 끝까지 들어왔다"></textarea>
      <div class="sheet-actions">
        <button id="shotCancel" class="btn-ghost">취소</button>
        <button id="shotSave" class="btn-primary">찰칵, 기록</button>
      </div>
    </div>
  </div>

  <script type="module" src="./mate.js"></script>
</body>
</html>
